backend:
  provider: mock
  model: mock-model
  api_key: mock
  base_url: mock://
  timeout_sec: 120
  temperature: 0.0

pipeline:
  max_backtrack_rounds: 4
  max_stage_retries: 2
  strict_closed_set: true
  alpha_rule: 0.2
  alpha_llm: 0.8
  media_mode: "off"
  max_video_frames: 4
  enable_subject_anchor_rule: true
  semantic_matcher:
    enabled: true
    model_name: sentence-transformers/all-MiniLM-L6-v2
    similarity_threshold: 0.35
    rule_semantic_threshold: 0.45

media:
  remote_root: /scratch/e1561245/Implicit_dataset
  allow_url_fallback: true
  local_cache_dir: ./cache/media

logging:
  save_prompt_text: false
  save_prompt_vars: true
  save_prompt_hash: true

rjg:
  top_k: 40
  rerank_k: 12
  tie_margin: 0.06
  loo: true
  weights:
    retrieve_support: 0.40
    judge_mech: 0.25
    judge_label: 0.20
    judge_role: 0.10
    rule_cue: 0.05

